name: Unit Tests
env:
  # increment this when downloads substantially change to avoid the internet
  DOWNLOAD_CACHE_VERSION: '8'
  CAPTURE_PROCESS_REPLAY: 1
  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

on:
  push:
    branches:
      - master
  pull_request:
  workflow_dispatch:

jobs:
  osxtests:
    strategy:
      fail-fast: false
      matrix:
        backend: [amd]

    name: Tests on MacOS (${{ matrix.backend }})
    runs-on: macos-15
    timeout-minutes: 45
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2 # NOTE: this fetches the HEAD commit of the PR
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: 3.12
      - name: Cache python packages
        uses: actions/cache@v4
        with:
          path: /Users/runner/Library/Python/3.12/lib/python/site-packages
          key: mockgpu-osx-${{ matrix.backend }}-packages-${{ hashFiles('**/setup.py') }}
      - name: Set env
        run: printf "${{ matrix.backend == 'amd' && 'MOCKGPU=1\nAMD=1\nFORWARD_ONLY=1' }}" >> $GITHUB_ENV
      - name: Install comgr
        if: matrix.backend == 'amd'
        run: |
          sudo mkdir -p /usr/local/lib
          curl -s -H "Authorization: token $GH_TOKEN" curl -s https://api.github.com/repos/nimlgen/amdcomgr_dylib/releases/latest | \
            jq -r '.assets[] | select(.name == "libamd_comgr.dylib").browser_download_url' | \
            sudo xargs curl -L -o /usr/local/lib/libamd_comgr.dylib
      - name: Install remu
        if: matrix.backend == 'amd'
        run: |
          curl -s -H "Authorization: token $GH_TOKEN" curl -s https://api.github.com/repos/Qazalin/remu/releases/latest | \
            jq -r '.assets[] | select(.name == "libremu.dylib").browser_download_url' | \
            sudo xargs curl -L -o /usr/local/lib/libremu.dylib
      - name: Install dependencies
        run: pip install --user -e '.[testing]' --extra-index-url https://download.pytorch.org/whl/cpu
      - name: Check Device.DEFAULT and print some source
        run: |
          PYTHONPATH=${{ github.workspace }} python3 -c "from tinygrad import Device; assert Device.DEFAULT == 'AMD', Device.DEFAULT"
          DEBUG=5 PYTHONPATH=${{ github.workspace }} FORWARD_ONLY=1 python3 test/test_ops.py TestOps.test_add
      - name: Run pytest (amd)
        if: matrix.backend=='amd'
        run: python -m pytest -n=auto test/test_hcq.py test/test_tiny.py --durations=20
  windowstests:
    strategy:
      fail-fast: false
      matrix:
        backend: [llvm, clang]

    name: Windows Tests (${{ matrix.backend }})
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Cache python packages
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\pip\Cache
          key: windows-${{ matrix.backend }}-py${{ matrix.python-version }}-${{ hashFiles('**/setup.py') }}
      - name: Cache downloads
        uses: actions/cache@v4
        with:
          path: ~\.cache\tinygrad\downloads
          key: downloads-cache-windows-${{ matrix.backend }}-${{ env.DOWNLOAD_CACHE_VERSION }}
      - name: Set environment variables
        shell: bash
        run: |
          if [[ "${{ matrix.backend }}" == "llvm" ]]; then
            echo "LLVM=1" >> $GITHUB_ENV
          elif [[ "${{ matrix.backend }}" == "clang" ]]; then
            echo "CLANG=1" >> $GITHUB_ENV
          fi
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[testing${{matrix.backend=='llvm'&&',llvm'||''}}]' --extra-index-url https://download.pytorch.org/whl/cpu
      - name: Check Device.DEFAULT
        shell: bash
        run: |
          PYTHONPATH=${{ github.workspace }} python -c "from tinygrad import Device; assert Device.DEFAULT in ['LLVM','CLANG'], Device.DEFAULT"
          DEBUG=5 PYTHONPATH=${{ github.workspace }} FORWARD_ONLY=1 python test/test_ops.py TestOps.test_add
      - name: Run core tests
        shell: bash
        run: |
          python -m pytest -n=auto test/test_ops.py test/test_dtype.py test/test_dtype_alu.py \
            test/test_linearizer.py test/test_symbolic_ops.py test/test_randomness.py \
            test/imported/test_indexing.py --durations=20
      - name: Run ONNX tests (LLVM only) 
        if: matrix.backend == 'llvm'
        shell: bash
        run: python -m pytest -n=auto test/external/external_test_onnx_backend.py --durations=20
      - name: Run TRANSCENDENTAL math
        shell: bash
        run: |
          TRANSCENDENTAL=2 python -m pytest -n=auto test/test_ops.py::TestOps::test_sin \
            test/test_ops.py::TestOps::test_cos test/test_ops.py::TestOps::test_tan \
            test/test_ops.py::TestOps::test_exp test/test_ops.py::TestOps::test_log --durations=20

